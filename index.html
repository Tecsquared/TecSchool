<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TEC — Trat Language School</title>
<meta name="description" content="Thai · English · Chinese. A boutique language school in Trat since 2014." />
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="/favicon-180.png">
<link rel="preconnect" href="https://use.typekit.net">
<link rel="preconnect" href="https://p.typekit.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Chaloops via Adobe Typekit (weights 400/600/700) — the locked brand display font -->
<link rel="stylesheet" href="https://use.typekit.net/agc2tne.css">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Nunito+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --tec-blue:    #1DB2FF;
    --tec-yellow:  #FED501;
    --tec-pink:    #FF208D;
    --tec-grey:    #9C9C9C;
    --tec-bg:      #F4F2EC;
    --tec-pill-bg: #ECEAE3;
    --tec-ink:     #1A1A1A;
    --tec-ink-soft:#2B2B2B;

    /* Hard offset shadows — flat, no blur — that's what gives the mockup its "weight" */
    --shadow-letter:        8px 10px 0 rgba(0,0,0,0.10);
    --shadow-letter-primary: 10px 12px 0 rgba(0,0,0,0.13);

    --shadow-btn:         0 10px 0 rgba(0,0,0,0.18);
    --shadow-btn-primary: 0 14px 0 rgba(0,0,0,0.22);

    --shadow-btn-hover:         0 14px 0 rgba(0,0,0,0.22), 0 22px 36px rgba(0,0,0,0.10);
    --shadow-btn-primary-hover: 0 18px 0 rgba(0,0,0,0.26), 0 28px 44px rgba(0,0,0,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--tec-bg);
    color: var(--tec-ink);
    font-family: 'Roboto', system-ui, -apple-system, Segoe UI, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    position: relative;
  }

  /* ---------- Paint-splatter background layer (behind everything) ---------- */
  .paint-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;       /* stretches to keep splatters anchored in viewport corners */
    /* Scale up slightly so the corner clusters push outward into the corners,
       freeing up the centre for T·E·C and the buttons */
    transform: scale(1.14);
    transform-origin: center;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }

  /* Make sure all real content sits above the paint */
  main, .version-switch { position: relative; z-index: 1; }

  /* ---------- Top-right handwritten "Trusted in Trat" annotation ---------- */
  /* Sits below + to the left of the top-right corner splatter so it doesn't touch */
  .trust-note {
    position: absolute;
    top:   clamp(56px, 9vh, 100px);
    right: clamp(225px, 20.5vw, 320px);
    transform: rotate(-1deg);
    transform-origin: center;
    pointer-events: none;
    user-select: none;
    z-index: 2;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .trust-note .text {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: clamp(20px, 2.25vw, 30px);
    color: var(--tec-ink);   /* same near-black as the headline */
    line-height: 1;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .trust-note .underline {
    display: block;
    width: 76%;
    height: clamp(6px, 0.7vw, 10px);
    margin-top: -2px;
    overflow: visible;
  }

  /* ---------- Hero stack ---------- */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(8px, 1.4vw, 20px) clamp(16px, 5vw, 32px) clamp(16px, 2.4vw, 32px);
    gap: clamp(14px, 2.2vw, 28px);
    text-align: center;
  }

  /* ---------- T · E · C brand mark ---------- */
  .tec {
    font-family: "chaloops", "Fredoka", system-ui, sans-serif;
    font-weight: 700;
    line-height: 0.9;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: clamp(20px, 3.4vw, 50px);
    user-select: none;
    margin-top: clamp(8px, 1.5vw, 22px);
  }

  .tec .letter {
    display: inline-block;
    font-size: clamp(96px, 17vw, 240px);
    line-height: 0.85;
    letter-spacing: -0.02em;
    text-shadow: var(--shadow-letter);
    transform: translateY(40px);
    opacity: 0;
    animation: letterIn 700ms cubic-bezier(.2,.9,.25,1.15) forwards;
    will-change: transform, opacity;
  }
  .tec .t  { color: var(--tec-blue);   animation-delay: 120ms; }
  .tec .e  {
    color: var(--tec-yellow);
    font-size: clamp(108px, 19vw, 270px);
    text-shadow: var(--shadow-letter-primary);
    -webkit-text-stroke: 3px var(--tec-ink);
    paint-order: stroke fill;
    animation-delay: 280ms;
  }
  .tec .c  { color: var(--tec-pink);   animation-delay: 440ms; }

  /* Solid black dot dividers — sized in CSS, not text bullets */
  .tec .sep {
    display: inline-block;
    width: clamp(14px, 1.6vw, 22px);
    height: clamp(14px, 1.6vw, 22px);
    background: var(--tec-ink);
    border-radius: 50%;
    transform: translateY(0);
    opacity: 0;
    animation: sepIn 500ms ease forwards;
    flex: none;
  }
  .tec .sep:nth-of-type(1) { animation-delay: 220ms; }
  .tec .sep:nth-of-type(2) { animation-delay: 380ms; }

  @keyframes letterIn {
    0%   { opacity: 0; transform: translateY(40px) scale(0.92); }
    60%  { opacity: 1; transform: translateY(-6px) scale(1.04); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes sepIn {
    to { opacity: 1; }
  }

  /* ---------- Headline ---------- */
  .headline {
    font-family: "chaloops", "Fredoka", system-ui, sans-serif;
    font-weight: 700;
    color: var(--tec-ink);
    font-size: clamp(40px, 9vw, 118px);
    line-height: 1;
    letter-spacing: -0.005em;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 600ms ease forwards;
    animation-delay: 700ms;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Buttons row ---------- */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: clamp(16px, 2vw, 22px);
    width: 100%;
    max-width: 1100px;
    align-items: stretch;
  }

  /* ===== V2: Neumorphic button (Uiverse / Peary74 style) — adapted for brand colours ===== */
  .btn {
    appearance: none;
    border: none;
    cursor: pointer;
    font-family: "chaloops", "Fredoka", system-ui, sans-serif;
    font-weight: 700;
    background: transparent;
    border-radius: 30px;
    padding: 22px 28px;
    min-height: 70px;
    font-size: clamp(24px, 3vw, 36px);
    line-height: 1;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 1px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    opacity: 0;
    animation: btnIn 500ms ease forwards;
    transition:
      letter-spacing 600ms ease,
      color 600ms ease,
      background-color 600ms ease,
      box-shadow 600ms ease;
    /* Neumorphic shadow tuned for the cream background */
    box-shadow:
       4px  4px 10px 0 rgba(255, 255, 255, 0.85),
      -4px -4px 10px 0 rgba(120, 110,  90, 0.28),
      inset -4px -4px  8px 0 rgba(255, 255, 255, 0.30),
      inset  4px  4px  8px 0 rgba(0, 0, 0, 0.22);
    border-top:    1px solid rgba(255, 255, 255, 0.12);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }

  .btn .label {
    display: inline-block;
    white-space: nowrap;
  }

  @keyframes btnIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Per-button: default text colour = language colour. On hover: fill with that colour. */
  .btn-thai    { color: var(--tec-blue);   animation-delay: 1000ms; }
  .btn-english { color: #C99B00;           animation-delay: 1100ms; } /* darker yellow for legibility on cream */
  .btn-chinese { color: var(--tec-pink);   animation-delay: 1200ms; }

  .btn:hover, .btn:focus-visible {
    letter-spacing: 4px;
    color: #fff;
    outline: none;
  }
  .btn-thai:hover, .btn-thai:focus-visible       { background: var(--tec-blue); }
  .btn-english:hover, .btn-english:focus-visible { background: var(--tec-yellow); color: #1A1A1A; }
  .btn-chinese:hover, .btn-chinese:focus-visible { background: var(--tec-pink); }

  .btn:active {
    box-shadow:
      inset -4px -4px  8px 0 rgba(255, 255, 255, 0.20),
      inset  4px  4px 12px 0 rgba(0, 0, 0, 0.30);
  }

  /* Keep buttons visible after entrance — no heartbeat in v2 */
  body.ready .btn { opacity: 1; }

  /* ---------- Desktop layout: horizontal button row ---------- */
  @media (min-width: 768px) {
    .buttons {
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: clamp(20px, 2.6vw, 36px);
    }
    .btn {
      flex: 0 1 240px;
      max-width: 280px;
      padding: 22px 32px;
      min-height: 76px;
      font-size: clamp(22px, 2.6vw, 34px);
    }
    /* English: noticeably bigger — matches the mockup proportion */
    .btn-english {
      flex: 0 1 380px;
      max-width: 440px;
      padding: 30px 44px;
      min-height: 100px;
      font-size: clamp(28px, 3.4vw, 48px);
    }
  }

  @media (min-width: 1100px) {
    .btn         { padding: 26px 40px; min-height: 86px; }
    .btn-english { padding: 36px 56px; min-height: 116px; }
  }

  /* ---------- Type-out animation for button labels ---------- */
  .label .char {
    opacity: 0;
    display: inline-block;
    transform: translateY(4px);
    animation: charIn 40ms ease forwards;
  }

  @keyframes charIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Cycling label swap (blur + slide) ---------- */
  .label.cycle {
    position: relative;
    display: inline-block;
    line-height: 1;
    /* Hold layout stable as text length changes; the .btn smooths width via transition */
  }
  .label.cycle .word {
    display: inline-block;
    transition:
      opacity 320ms ease,
      transform 320ms cubic-bezier(.2,.8,.3,1),
      filter 320ms ease;
  }
  .label.cycle .word.enter {
    opacity: 0;
    transform: translateY(10px);
    filter: blur(10px);
  }
  .label.cycle .word.in {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
  .label.cycle .word.out {
    opacity: 0;
    transform: translateY(-10px);
    filter: blur(10px);
  }

  /* (v1's transform/box-shadow override removed — v2 uses the neumorphic transition above) */

  /* ---------- Reduced motion fallback ---------- */
  @media (prefers-reduced-motion: reduce) {
    .tec .letter, .tec .sep,
    .headline,
    .btn,
    body.ready .btn-thai,
    body.ready .btn-english,
    body.ready .btn-chinese,
    .label .char {
      animation: none !important;
      transition: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
    .btn-english { transform: scale(1.04) !important; }
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  .version-switch {
    position: fixed;
    bottom: 12px;
    right: 14px;
    font-family: 'Roboto', sans-serif;
    font-size: 11px;
    color: var(--tec-grey);
    text-decoration: none;
    letter-spacing: 0.04em;
    opacity: 0.7;
    z-index: 50;
  }
  .version-switch:hover { opacity: 1; color: var(--tec-ink); }
</style>
</head>
<body>

  <img class="paint-bg" src="V2 Paint splatters Home page.png" alt="" aria-hidden="true" />

  <div class="trust-note" role="img" aria-label="Trusted in Trat since 2014">
    <span class="text">Trusted in Trat since 2014</span>
    <svg class="underline" viewBox="0 0 220 14" preserveAspectRatio="none" aria-hidden="true">
      <!-- Painterly brush stroke: imperfect curve with slight thickness variation -->
      <path d="M4,8 C 40,3 80,11 120,6 C 155,2 185,10 216,5"
            stroke="#FED501" stroke-width="7" stroke-linecap="round" fill="none"
            opacity="0.95"/>
      <!-- Tiny drips for painterly feel -->
      <circle cx="218" cy="6"  r="1.6" fill="#FED501" opacity="0.7"/>
      <circle cx="42"  cy="11" r="1.2" fill="#FED501" opacity="0.6"/>
    </svg>
  </div>

  <main>
    <div class="tec" aria-label="T E C">
      <span class="letter t">T</span>
      <span class="sep" aria-hidden="true"></span>
      <span class="letter e">E</span>
      <span class="sep" aria-hidden="true"></span>
      <span class="letter c">C</span>
    </div>

    <h1 class="headline">I want to learn</h1>

    <div class="buttons" role="group" aria-label="Choose a language">
      <a href="/thai"    class="btn btn-thai"    data-cycle='["Thai","สวัสดี"]'    data-interval="3600"><span class="label cycle" aria-hidden="true"></span><span class="sr-only">Thai</span></a>
      <a href="/english" class="btn btn-english" data-cycle='["English","Hello"]'   data-interval="3600"><span class="label cycle" aria-hidden="true"></span><span class="sr-only">English</span></a>
      <a href="/chinese" class="btn btn-chinese" data-cycle='["Chinese","你好"]'     data-interval="3600"><span class="label cycle" aria-hidden="true"></span><span class="sr-only">Chinese</span></a>
    </div>
  </main>

<script>
  (function () {
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const btns = document.querySelectorAll('.btn');
    const SWAP_MS = 320; // matches CSS transition

    function makeWord(text, state) {
      const span = document.createElement('span');
      span.className = 'word ' + state;
      span.textContent = text;
      return span;
    }

    function swapTo(label, text) {
      // Defensive: kill any stragglers from previous swaps (in/out/enter)
      const stragglers = Array.from(label.querySelectorAll('.word'));
      const next = makeWord(text, 'enter');
      label.appendChild(next);

      // Force layout so .enter is the starting frame, then transition in
      next.offsetHeight;
      requestAnimationFrame(() => {
        next.classList.remove('enter');
        next.classList.add('in');

        stragglers.forEach(old => {
          old.classList.remove('in', 'enter');
          old.classList.add('out');
        });
      });

      // Hard cleanup — guaranteed removal of every prior word after the transition
      setTimeout(() => {
        stragglers.forEach(old => { try { old.remove(); } catch (_) {} });
      }, SWAP_MS + 50);
    }

    btns.forEach((btn, i) => {
      const cycle = JSON.parse(btn.dataset.cycle);
      const label = btn.querySelector('.label');
      const interval = parseInt(btn.dataset.interval, 10) || 3500;
      let idx = 0;

      // Seed first word — start hidden, animate in via the entrance flow
      const first = makeWord(cycle[0], reduced ? 'in' : 'enter');
      label.appendChild(first);

      if (reduced) return; // no cycling

      // Animate first word in after the entrance + button-fade-in
      const entranceDelay = 1100 + i * 100; // matches .btn animation-delay
      setTimeout(() => {
        first.classList.replace('enter', 'in');
      }, entranceDelay);

      // Begin cycling, staggered so buttons don't swap in lockstep
      const cycleStart = entranceDelay + 1500 + i * 400;
      setTimeout(() => {
        setInterval(() => {
          idx = (idx + 1) % cycle.length;
          swapTo(label, cycle[idx]);
        }, interval);
      }, cycleStart);
    });

    // Switch on heartbeat after entrance settles
    setTimeout(() => document.body.classList.add('ready'), reduced ? 0 : 1700);
  })();
</script>
</body>
</html>
